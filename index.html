<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoBoy - Control Epidemiológico de Anemia</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }

        .search-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 300px;
        }

        h2 { margin: 0 0 10px 0; font-size: 1.1em; color: #764ba2; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        label { font-size: 0.75em; font-weight: 600; color: #4a5568; display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        
        .btn-filter { 
            width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 15px;
        }

        .child-tag { background: #f3f0ff; padding: 10px; border-radius: 8px; display: block; margin-top: 5px; font-size: 0.85em; border-left: 4px solid #764ba2; }
        .anemia-alert { border-left: 4px solid #e53e3e; background: #fff5f5; border-bottom: 1px solid #fed7d7; }
        .anemia-text { color: #c53030; font-weight: 700; display: block; margin-top: 2px; }
        
        #stats { margin-top:12px; font-size: 0.8em; color: #718096; font-weight: 500; }
        hr { border: 0; border-top: 1px solid #edf2f7; margin: 10px 0; }
    </style>
</head>
<body>

<div class="search-panel">
    <h2><i class="fas fa-notes-medical"></i> Filtro de Seguimiento</h2>
    
    <label>Nacidos desde:</label>
    <input type="date" id="dateStart">
    
    <label>Nacidos hasta:</label>
    <input type="date" id="dateEnd">
    
    <button class="btn-filter" onclick="loadMarkers()">Actualizar Visor</button>
    <div id="stats">Esperando acción...</div>
</div>

<div id="map"></div>

<script>
    // Configuración inicial del mapa centrada en Tingo María / Castillo Grande
    const map = L.map('map').setView([-9.2938, -75.9926], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    // Iconos personalizados
    const redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    const blueIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    // PARSER DE FECHAS "TODO TERRENO"
    function parseAnyDate(val) {
        if (!val || val === "" || val === 0 || String(val).includes("#")) return null;
        
        // Si es número serial de Excel
        if (!isNaN(val) && typeof val === 'number') {
            return new Date((val - 25569) * 86400 * 1000);
        }

        // Si es texto con barras o guiones
        let s = String(val).trim();
        let parts = s.split(/[\/\-]/);
        if (parts.length === 3) {
            // Formato esperado DD/MM/AAAA
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }
        
        let d = new Date(s);
        return isNaN(d.getTime()) ? null : d;
    }

    function calcularEdad(fechaNacStr) {
        const f = parseAnyDate(fechaNacStr);
        if (!f) return "Error en fecha";
        const hoy = new Date();
        let edad = hoy.getFullYear() - f.getFullYear();
        if (hoy.getMonth() < f.getMonth() || (hoy.getMonth() === f.getMonth() && hoy.getDate() < f.getDate())) edad--;
        return edad < 0 ? "0 años" : edad + (edad === 1 ? " año" : " años");
    }

    async function loadMarkers() {
        const startStr = document.getElementById('dateStart').value;
        const endStr = document.getElementById('dateEnd').value;
        const dStart = startStr ? new Date(startStr + "T00:00:00") : null;
        const dEnd = endStr ? new Date(endStr + "T23:59:59") : null;

        markersLayer.clearLayers();
        document.getElementById('stats').innerText = "Consultando base de datos...";

        const URL_API = "https://script.google.com/macros/s/AKfycbyXn_7STdNy6TtK0WsOKGSrWRWg-cN-btfuuJVI2mgI_J9HVHyPfkgl0Kt1-iJ4Cxk/exec";

        try {
            const response = await fetch(URL_API);
            const data = await response.json();
            const grupos = {};
            let totalMatch = 0;

            data.forEach(item => {
                // 1. Validar coordenadas
                if (!item.coords || String(item.coords).includes("#")) return;

                // 2. Filtrar por fecha de nacimiento
                const fNac = parseAnyDate(item.nacimientoHijo);
                if (dStart && fNac && fNac < dStart) return;
                if (dEnd && fNac && fNac > dEnd) return;

                if (!grupos[item.coords]) grupos[item.coords] = [];
                grupos[item.coords].push(item);
                totalMatch++;
            });

            for (const coord in grupos) {
                const personas = grupos[coord];
                const latlng = coord.split(",").map(Number);
                
                if (isNaN(latlng[0]) || isNaN(latlng[1])) continue;

                // Lógica de Anemia: Detectamos si hay CUALQUIER valor en la columna O
                const casaConAnemia = personas.some(p => p.anemia && String(p.anemia).trim() !== "");
                
                let content = `<div style="min-width:200px">
                                <b>Responsable:</b> ${personas[0].nombreMadre || 'No indicado'}<br>
                                <b>Niños en este punto:</b> ${personas.length}<hr>`;
                
                personas.forEach(p => {
                    const valorAnemia = p.anemia ? String(p.anemia).trim() : "";
                    const tieneAnemia = valorAnemia !== "";
                    const fAnemia = parseAnyDate(valorAnemia);
                    
                    let bloqueAnemia = "✅ Sin anemia";
                    if (tieneAnemia) {
                        let altaEstimada = "No calculable";
                        if (fAnemia) {
                            let fAlta = new Date(fAnemia);
                            fAlta.setMonth(fAlta.getMonth() + 7);
                            altaEstimada = fAlta.toLocaleDateString('es-PE');
                        }
                        bloqueAnemia = `
                            <span class="anemia-text">⚠️ SÍ TIENE ANEMIA</span>
                            📅 Diagnóstico: ${valorAnemia}<br>
                            ⏳ <b>Alta estimada: ${altaEstimada}</b>
                        `;
                    }

                    content += `
                        <div class="child-tag ${tieneAnemia ? 'anemia-alert' : ''}">
                            👶 <b>${p.nombreHijo}</b><br>
                            🎂 Edad: ${calcularEdad(p.nacimientoHijo)}<br>
                            ${bloqueAnemia}
                        </div>`;
                });

                content += `</div>`;

                L.marker(latlng, { icon: casaConAnemia ? redIcon : blueIcon })
                 .bindPopup(content)
                 .addTo(markersLayer);
            }

            document.getElementById('stats').innerText = `Se encontraron ${totalMatch} niños registrados.`;

        } catch (e) {
            document.getElementById('stats').innerText = "Error: Verifica la conexión o el formato del Excel.";
            console.error(e);
        }
    }

    // Carga inicial
    loadMarkers();
</script>

</body>
</html>
