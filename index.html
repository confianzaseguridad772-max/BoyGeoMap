<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoBoy - Visor de Cobertura</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }

        .search-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 280px;
        }

        h2 { margin: 0 0 10px 0; font-size: 1.2em; color: #764ba2; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        label { font-size: 0.8em; font-weight: 600; color: #4a5568; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        
        .btn-filter { 
            width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600;
        }

        .info-popup b { color: #764ba2; }
        .child-tag { background: #f3f0ff; padding: 4px 8px; border-radius: 4px; display: block; margin-top: 5px; font-size: 0.9em; border-left: 3px solid #764ba2; }
    </style>
</head>
<body>

<div class="search-panel">
    <h2><i class="fas fa-map-marked-alt"></i> Filtros</h2>
    <label>Buscar por Nacimiento:</label>
    <input type="date" id="filterDate">
    <button class="btn-filter" onclick="loadMarkers()">Aplicar Filtro</button>
    <div id="stats" style="margin-top:10px; font-size: 0.8em; color: #718096;"></div>
</div>

<div id="map"></div>

<script>
    // Inicializar mapa en una coordenada central (Cerca de Castillo Grande/Tingo María)
    const map = L.map('map').setView([-9.2938, -75.9926], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let markersLayer = L.layerGroup().addTo(map);

    // Función para calcular la edad exacta
    function calcularEdad(fechaStr) {
        if (!fechaStr) return "S/D";
        const partes = fechaStr.split("/");
        const cumple = new Date(partes[2], partes[1] - 1, partes[0]);
        const hoy = new Date();
        let edad = hoy.getFullYear() - cumple.getFullYear();
        const m = hoy.getMonth() - cumple.getMonth();
        if (m < 0 || (m === 0 && hoy.getDate() < cumple.getDate())) edad--;
        return edad + " años";
    }

    async function loadMarkers() {
        const selectedDate = document.getElementById('filterDate').value; // YYYY-MM-DD
        markersLayer.clearLayers();
        
        // REEMPLAZA ESTA URL POR TU URL DE WEB APP DE GOOGLE
        const URL_API = "https://script.google.com/macros/s/AKfycbyXn_7STdNy6TtK0WsOKGSrWRWg-cN-btfuuJVI2mgI_J9HVHyPfkgl0Kt1-iJ4Cxk/exec";

        try {
            const response = await fetch(URL_API);
            const data = await response.json();
            
            // Agrupar por coordenadas para contar niños en el mismo punto
            const grupos = {};
            data.forEach(item => {
                const fNac = item.nacimientoHijo; // DD/MM/AAAA
                
                // Si hay filtro, verificar si coincide
                if (selectedDate) {
                    const fFiltro = selectedDate.split("-").reverse().join("/"); // DD/MM/YYYY
                    if (fNac !== fFiltro) return;
                }

                if (!grupos[item.coords]) grupos[item.coords] = [];
                grupos[item.coords].push(item);
            });

            let totalNiños = 0;

            // Crear marcadores
            for (const coord in grupos) {
                const personas = grupos[coord];
                const latlng = coord.split(",").map(Number);
                
                let content = `<div class="info-popup">
                    <b>Mamá:</b> ${personas[0].nombreMadre}<br>
                    <b>Domicilio:</b> ${personas[0].domicilio}<br>
                    <b>Niños registrados aquí:</b> ${personas.length}<hr>`;
                
                personas.forEach(p => {
                    content += `<div class="child-tag">
                        👶 ${p.nombreHijo} (${calcularEdad(p.nacimientoHijo)})
                    </div>`;
                    totalNiños++;
                });

                content += `</div>`;

                L.marker(latlng).bindPopup(content).addTo(markersLayer);
            }

            document.getElementById('stats').innerText = `Mostrando ${totalNiños} niños registrados.`;

        } catch (e) {
            console.error("Error cargando datos:", e);
        }
    }

    // Cargar al iniciar
    loadMarkers();
</script>

</body>
</html>
