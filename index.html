<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoBoy - Control de Anemia Profesional</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .search-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 300px;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.1em; color: #764ba2; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        label { font-size: 0.75em; font-weight: 600; color: #4a5568; display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        .btn-filter { 
            width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 15px;
        }
        .child-tag { background: #f3f0ff; padding: 10px; border-radius: 8px; display: block; margin-top: 5px; font-size: 0.85em; border-left: 4px solid #764ba2; }
        .anemia-alert { border-left: 4px solid #e53e3e; background: #fff5f5; color: #2d3748; }
        .anemia-text { color: #c53030; font-weight: 700; display: block; margin-bottom: 2px; }
        #stats { margin-top:12px; font-size: 0.8em; color: #718096; font-weight: 500; }
    </style>
</head>
<body>

<div class="search-panel">
    <h2><i class="fas fa- baby"></i> Control Infantil</h2>
    <label>Nacidos desde:</label>
    <input type="date" id="dateStart">
    <label>Nacidos hasta:</label>
    <input type="date" id="dateEnd">
    <button class="btn-filter" onclick="loadMarkers()">Actualizar Mapa</button>
    <div id="stats">Cargando datos...</div>
</div>

<div id="map"></div>

<script>
    const map = L.map('map').setView([-9.2938, -75.9926], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    const redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    const blueIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    // FUNCIÓN MEJORADA: Parsea casi cualquier formato de fecha de Excel/Google
    function parseCualquierFecha(valor) {
        if (!valor || valor === "") return null;
        
        // 1. Si ya es un objeto Date
        if (valor instanceof Date) return valor;

        // 2. Si viene como número serial de Excel (ej: 45678)
        if (!isNaN(valor) && typeof valor === 'number') {
            return new Date((valor - 25569) * 86400 * 1000);
        }

        // 3. Si es texto, limpiar espacios
        let fechaStr = String(valor).trim();

        // Manejar formatos DD/MM/AAAA o DD-MM-AAAA
        let partes = fechaStr.split(/[\/\-]/);
        if (partes.length === 3) {
            let dia = parseInt(partes[0]);
            let mes = parseInt(partes[1]) - 1;
            let anio = parseInt(partes[2]);
            // Ajuste para años de 2 dígitos
            if (anio < 100) anio += 2000;
            return new Date(anio, mes, dia);
        }

        // 4. Intentar parseo nativo como último recurso
        let intentoNativo = new Date(fechaStr);
        return isNaN(intentoNativo) ? null : intentoNativo;
    }

    function formatDate(date) {
        if (!date || isNaN(date)) return "S/D";
        return date.toLocaleDateString('es-PE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function calcularEdad(fechaValor) {
        const cumple = parseCualquierFecha(fechaValor);
        if (!cumple) return "S/D";
        const hoy = new Date();
        let edad = hoy.getFullYear() - cumple.getFullYear();
        let m = hoy.getMonth() - cumple.getMonth();
        if (m < 0 || (m === 0 && hoy.getDate() < cumple.getDate())) edad--;
        
        if (edad < 0) return "Recién nacido";
        return edad + (edad === 1 ? " año" : " años");
    }

    async function loadMarkers() {
        const startStr = document.getElementById('dateStart').value;
        const endStr = document.getElementById('dateEnd').value;
        const dStart = startStr ? new Date(startStr + "T00:00:00") : null;
        const dEnd = endStr ? new Date(endStr + "T23:59:59") : null;

        markersLayer.clearLayers();
        document.getElementById('stats').innerText = "Procesando...";

        const URL_API = "https://script.google.com/macros/s/AKfycbyXn_7STdNy6TtK0WsOKGSrWRWg-cN-btfuuJVI2mgI_J9HVHyPfkgl0Kt1-iJ4Cxk/exec";

        try {
            const response = await fetch(URL_API);
            const data = await response.json();
            const grupos = {};
            let totalMatch = 0;

            data.forEach(item => {
                const fechaHijo = parseCualquierFecha(item.nacimientoHijo);
                if (dStart && fechaHijo < dStart) return;
                if (dEnd && fechaHijo > dEnd) return;

                if (!grupos[item.coords]) grupos[item.coords] = [];
                grupos[item.coords].push(item);
                totalMatch++;
            });

            for (const coord in grupos) {
                const personas = grupos[coord];
                const latlng = coord.split(",").map(Number);
                
                // Marcador rojo si alguien tiene algo escrito en la columna Anemia
                const tieneAnemiaCualquiera = personas.some(p => p.anemia && String(p.anemia).trim() !== "");
                
                let content = `<b>Responsable:</b> ${personas[0].nombreMadre || 'S/D'}<br>
                               <b>Integrantes:</b> ${personas.length}<hr>`;
                
                personas.forEach(p => {
                    const fechaDiagAnemia = parseCualquierFecha(p.anemia);
                    const esAnemico = p.anemia && String(p.anemia).trim() !== "";
                    
                    let altaInfo = "";
                    if (esAnemico && fechaDiagAnemia) {
                        let fechaAlta = new Date(fechaDiagAnemia);
                        fechaAlta.setMonth(fechaAlta.getMonth() + 7);
                        altaInfo = `<br>📅 Diag: ${formatDate(fechaDiagAnemia)}<br>⏳ <b>Alta: ${formatDate(fechaAlta)}</b>`;
                    } else if (esAnemico) {
                        altaInfo = `<br>📅 Diag: ${p.anemia}`; // Si no es fecha, poner el texto que haya
                    }

                    content += `
                    <div class="child-tag ${esAnemico ? 'anemia-alert' : ''}">
                        👶 <b>${p.nombreHijo}</b><br>
                        🎂 Edad: ${calcularEdad(p.nacimientoHijo)}
                        ${esAnemico ? `<br><span class="anemia-text">⚠️ ANEMIA DETECTADA</span>${altaInfo}` : '<br>✅ Sin anemia'}
                    </div>`;
                });

                L.marker(latlng, { icon: tieneAnemiaCualquiera ? redIcon : blueIcon })
                 .bindPopup(content)
                 .addTo(markersLayer);
            }

            document.getElementById('stats').innerText = `Mostrando ${totalMatch} niños.`;

        } catch (e) {
            document.getElementById('stats').innerText = "Error al conectar con Excel.";
            console.error(e);
        }
    }

    loadMarkers();
</script>

</body>
</html>
