<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoBoy - Castillo Grande FULL</title>
    
    <!-- Librerías de Mapas -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <!-- Fuentes e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f97316;
            --vaccine: #8b5cf6;
            --cred: #3b82f6;
            --dark: #1e293b;
            --glass: rgba(255, 255, 255, 0.98);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: #f0f2f5; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Panel Lateral Expandido */
        .search-panel {
            position: absolute; top: 0; left: 0; bottom: 0; z-index: 1010;
            background: var(--glass); padding: 25px; width: 320px;
            transition: transform 0.3s ease; box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            overflow-y: auto; border-right: 1px solid rgba(0,0,0,0.1);
        }
        .search-panel.hidden { transform: translateX(-100%); }

        .toggle-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1020;
            background: var(--primary); color: white; border: none;
            width: 50px; height: 50px; border-radius: 15px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex;
            align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .search-panel:not(.hidden) + .toggle-btn { left: 340px; }

        h2 { margin-top: 0; font-size: 1.4rem; color: var(--dark); display: flex; align-items: center; gap: 10px; }

        .search-input {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0;
            margin-bottom: 20px; font-size: 1rem; box-sizing: border-box; outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--primary); }

        /* Filtros */
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .btn-quick {
            padding: 12px 5px; font-size: 0.75rem; border-radius: 10px; border: 1px solid #e2e8f0;
            background: white; cursor: pointer; font-weight: 700; color: #64748b;
            transition: all 0.2s; text-align: center; text-transform: uppercase;
        }
        .btn-quick.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-quick.active-anemia { background: var(--danger); color: white; border-color: var(--danger); }
        .btn-quick.active-vaccine { background: var(--vaccine); color: white; border-color: var(--vaccine); }
        .btn-quick.active-cred { background: var(--cred); color: white; border-color: var(--cred); }

        /* Estadísticas */
        .stats-box {
            background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px;
        }
        .stat-line { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; color: #475569; }
        .stat-line b { color: var(--dark); font-weight: 700; }

        /* Tarjetas de Información */
        .popup-container { width: 300px; max-height: 500px; }
        .header-madre { 
            background: #f1f5f9; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0;
        }
        .header-madre b { font-size: 1.1rem; color: var(--dark); display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        .child-card { 
            background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px;
            border: 1px solid #e2e8f0; border-left: 6px solid #cbd5e1;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .child-card.anemia-border { border-left-color: var(--danger); }
        .child-card.ina-border { border-left-color: var(--warning); }

        /* Badges de Salud */
        .status-badge { 
            margin-top: 8px; padding: 8px; border-radius: 8px; font-size: 0.75rem;
            font-weight: 700; display: block; border: 1px solid transparent;
        }
        .bg-red { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
        .bg-orange { background: #ffedd5; color: #9a3412; border-color: #fed7aa; }
        .bg-blue { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
        .bg-purple { background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; }

        /* Botones de Acción */
        .btn-action {
            text-decoration: none; padding: 12px; border-radius: 10px; font-size: 0.8rem; 
            font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; border: none; transition: 0.2s; margin-bottom: 5px;
        }
        .btn-whatsapp { background: #22c55e; color: white !important; }
        .btn-phone { background: #3b82f6; color: white !important; }
        .btn-como-llegar { background: var(--dark); color: white !important; width: 100%; margin-top: 10px; }
        .btn-registrar-visita { background: #059669; color: white !important; width: 100%; margin-top: 10px; }

        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<div class="search-panel" id="sidePanel">
    <h2><i class="fas fa-hand-holding-heart" style="color:var(--primary)"></i> Castillo Monitor</h2>
    
    <input type="text" id="mainSearch" class="search-input" placeholder="Buscar DNI, Niño o Madre..." oninput="applyFilters()">

    <div class="filter-grid">
        <button class="btn-quick" id="btn-soloAnemia" onclick="toggleFilter('soloAnemia')">NIÑOS ANEMIA</button>
        <button class="btn-quick" id="btn-anemia" onclick="toggleFilter('anemia')">INA. ANEMIA</button>
        <button class="btn-quick" id="btn-cred" onclick="toggleFilter('cred')">INA. CRED</button>
        <button class="btn-quick" id="btn-vacuna" onclick="toggleFilter('vacuna')">INA. VACUNA</button>
    </div>

    <div class="stats-box">
        <div class="stat-line"><span>Madres encontradas:</span> <b id="stat-madres">0</b></div>
        <div class="stat-line"><span>Total Niños:</span> <b id="stat-ninos">0</b></div>
        <div class="stat-line"><span>Con Anemia:</span> <b id="stat-anemicos" style="color:var(--danger)">0</b></div>
        <hr style="border:0; border-top:1px solid #e2e8f0; margin: 15px 0;">
        <div class="stat-line"><span>Ina. Anemia:</span> <b id="stat-ina-anemia">0</b></div>
        <div class="stat-line"><span>Ina. CRED:</span> <b id="stat-ina-cred">0</b></div>
        <div class="stat-line"><span>Ina. Vacuna:</span> <b id="stat-ina-vacuna">0</b></div>
    </div>
    
    <button onclick="fetchData()" style="width:100%; background:var(--primary); color:white; border:none; padding:18px; border-radius:15px; cursor:pointer; font-weight:700; font-size:1rem;">
        <i class="fas fa-sync-alt"></i> ACTUALIZAR PADRÓN
    </button>
    <div id="syncStatus" style="text-align:center; font-size:0.8rem; margin-top:15px; color:#64748b;"></div>
</div>

<button class="toggle-btn" onclick="togglePanel()"><i class="fas fa-bars"></i></button>

<div id="map"></div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbzNPmSm-pST9T9oNWfTRk3EBf2GXj3VVnAyANSuNaWwf7MKzHjV5Vf1qR3T0fmvTN3r/exec";
    
    const map = L.map('map', { center: [-9.2938, -75.9926], zoom: 15, zoomControl: false });
    L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(map);
    
    let markersLayer = L.layerGroup().addTo(map);
    let userMarker = L.circleMarker([0,0], { radius: 9, color: 'white', fillColor: '#2563eb', fillOpacity: 1, weight: 3 }).addTo(map);
    
    let rawData = [];
    let activeFilters = { anemia: false, cred: false, vacuna: false, soloAnemia: false };
    let routingControl = null;
    let watchId = null;

    async function fetchData() {
        const status = document.getElementById('syncStatus');
        status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando al servidor...';
        try {
            const response = await fetch(URL_API);
            rawData = await response.json();
            status.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success)"></i> Padrón sincronizado';
            applyFilters();
        } catch (e) {
            status.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i> Error de conexión';
        }
    }

    function toggleFilter(type) {
        activeFilters[type] = !activeFilters[type];
        const btn = document.getElementById('btn-' + type);
        if(type === 'soloAnemia') btn.classList.toggle('active-anemia');
        else if(type === 'vacuna') btn.classList.toggle('active-vaccine');
        else if(type === 'cred') btn.classList.toggle('active-cred');
        else btn.classList.toggle('active');
        applyFilters();
    }

    function applyFilters() {
        markersLayer.clearLayers();
        const term = document.getElementById('mainSearch').value.toLowerCase();
        
        let groups = {};
        let stats = { m: new Set(), n: 0, an: 0, iAn: 0, iCr: 0, iVa: 0 };

        rawData.forEach(item => {
            const isAnemic = item.anemia && (item.anemia == "1" || item.anemia.toString().toLowerCase() === "si");
            const match = !term || item.nombreHijo.toLowerCase().includes(term) || item.nombreMadre.toLowerCase().includes(term) || String(item.dniHijo).includes(term);
            
            if (!match) return;
            if (activeFilters.soloAnemia && !isAnemic) return;
            if (activeFilters.anemia && !item.citaFaltante) return;
            if (activeFilters.cred && !item.citaCred) return;
            if (activeFilters.vacuna && !item.citaVacuna) return;

            stats.n++;
            stats.m.add(item.nombreMadre);
            if(isAnemic) stats.an++;
            if(item.citaFaltante) stats.iAn++;
            if(item.citaCred) stats.iCr++;
            if(item.citaVacuna) stats.iVa++;

            if (!groups[item.coords]) groups[item.coords] = [];
            groups[item.coords].push(item);
        });

        document.getElementById('stat-madres').innerText = stats.m.size;
        document.getElementById('stat-ninos').innerText = stats.n;
        document.getElementById('stat-anemicos').innerText = stats.an;
        document.getElementById('stat-ina-anemia').innerText = stats.iAn;
        document.getElementById('stat-ina-cred').innerText = stats.iCr;
        document.getElementById('stat-ina-vacuna').innerText = stats.iVa;

        for (const c in groups) {
            const p = groups[c];
            const latlng = c.split(",").map(Number);
            
            let html = `<div class="popup-container">
                <div class="header-madre">
                    <small>MADRE / RESPONSABLE</small>
                    <b>${p[0].nombreMadre}</b>
                    <div style="font-size:0.85rem; margin-top:5px;"><i class="fas fa-phone-alt"></i> Cel: ${p[0].celular || 'Sin número'}</div>
                    <div style="display:flex; gap:8px; margin-top:12px;">
                        <a href="https://wa.me/51${p[0].celular}" target="_blank" class="btn-action btn-whatsapp" style="flex:1"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                        <a href="tel:${p[0].celular}" class="btn-action btn-phone" style="flex:1"><i class="fas fa-phone-volume"></i> Llamar</a>
                    </div>
                    <button class="btn-action btn-como-llegar" onclick="navegar(${latlng[0]}, ${latlng[1]}, '${p[0].nombreMadre}')">
                        <i class="fas fa-directions"></i> TRAZAR RUTA A CASA
                    </button>
                </div>`;

            p.forEach(h => {
                const isAn = h.anemia && (h.anemia == "1" || h.anemia.toString().toLowerCase() === "si");
                const isIna = h.citaFaltante || h.citaCred || h.citaVacuna;

                html += `<div class="child-card ${isAn ? 'anemia-border' : (isIna ? 'ina-border' : '')}">
                    <span style="font-weight:700; color:var(--dark); font-size:0.95rem;">👶 ${h.nombreHijo}</span>
                    <div style="font-size:0.75rem; color:#64748b; margin-bottom:5px;">DNI: ${h.dniHijo}</div>
                    
                    ${isAn ? `<span class="status-badge bg-red"><i class="fas fa-exclamation-circle"></i> NIÑO CON ANEMIA</span>` : ''}
                    ${h.citaFaltante ? `<span class="status-badge bg-orange"><i class="fas fa-clock"></i> INA. ANEMIA: ${h.citaFaltante}</span>` : ''}
                    ${h.citaCred ? `<span class="status-badge bg-blue"><i class="fas fa-notes-medical"></i> INA. CRED: ${h.citaCred}</span>` : ''}
                    ${h.citaVacuna ? `<span class="status-badge bg-purple"><i class="fas fa-syringe"></i> INA. VACUNA: ${h.citaVacuna}</span>` : ''}
                    
                    <button class="btn-action btn-registrar-visita" onclick="registrarVisita('${h.nombreMadre}','${h.nombreHijo}')">
                        <i class="fas fa-check-double"></i> REGISTRAR VISITA EFECTIVA
                    </button>
                </div>`;
            });

            L.marker(latlng).addTo(markersLayer).bindPopup(html + "</div>");
        }
    }

    function navegar(lat, lng, nombre) {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        hablar("Trazando ruta para visitar a " + nombre);
        
        watchId = navigator.geolocation.watchPosition(pos => {
            const uLat = pos.coords.latitude;
            const uLng = pos.coords.longitude;
            userMarker.setLatLng([uLat, uLng]);
            
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(uLat, uLng), L.latLng(lat, lng)],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'foot' }),
                lineOptions: { styles: [{ color: '#2563eb', opacity: 0.8, weight: 6 }] },
                show: false, createMarker: () => null
            }).addTo(map);
        }, null, { enableHighAccuracy: true });
    }

    async function registrarVisita(madre, hijo) {
        const btn = event.currentTarget;
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> GUARDANDO...';
        
        navigator.geolocation.getCurrentPosition(async pos => {
            const payload = { 
                action: "registrarVisita", 
                madre: madre, 
                hijo: hijo, 
                coords: `${pos.coords.latitude},${pos.coords.longitude}`,
                fecha: new Date().toLocaleString()
            };
            
            try {
                await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                btn.innerHTML = '✅ VISITA REGISTRADA';
                btn.style.background = "#059669";
                hablar("Visita de " + hijo + " registrada correctamente.");
            } catch (e) {
                btn.innerHTML = '❌ ERROR';
                btn.style.background = "#dc2626";
            }
        });
    }

    function hablar(msg) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-PE';
        window.speechSynthesis.speak(u);
    }

    function togglePanel() { 
        document.getElementById('sidePanel').classList.toggle('hidden'); 
    }
    
    fetchData();
</script>
</body>
</html>
